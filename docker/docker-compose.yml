# YouTube Audiobook Pipeline - Docker Compose
# =============================================
# Usage:
#   docker compose up -d          # Start all services
#   docker compose run pipeline   # Run pipeline
#   docker compose down           # Stop all services

version: "3.9"

services:
  # Main pipeline service
  pipeline:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: youtube-audiobook-pipeline:latest
    container_name: audiobook-pipeline
    volumes:
      - ../data:/app/data
      - ../config:/app/config
      - ../.env:/app/.env
    environment:
      - PYTHONUNBUFFERED=1
    command: ["python", "-m", "orchestrator.run", "--help"]

  # Redis (for Celery task queue - optional)
  redis:
    image: redis:7-alpine
    container_name: audiobook-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Celery worker (for background processing - optional)
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: audiobook-worker
    volumes:
      - ../data:/app/data
      - ../config:/app/config
      - ../.env:/app/.env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    command: ["celery", "-A", "orchestrator.tasks", "worker", "--loglevel=info", "--concurrency=1"]
    depends_on:
      - redis

  # MinIO (S3-compatible storage - optional)
  minio:
    image: minio/minio:latest
    container_name: audiobook-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  redis_data:
  minio_data:
